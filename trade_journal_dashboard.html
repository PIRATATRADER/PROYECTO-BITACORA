<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Journal Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #111318;
    --bg3: #181c24;
    --border: #1e2530;
    --green: #00e676;
    --red: #ff3d57;
    --cyan: #00e5ff;
    --gold: #f5a623;
    --text: #e8eaf0;
    --muted: #4a5568;
    --muted2: #7a8599;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
  }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1500px;
    margin: 0 auto;
    padding: 24px 32px 48px;
  }
  header {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  h1 {
    margin: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
  }
  .sub {
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .back-btn {
    text-decoration: none;
    color: var(--text);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
  }
  .kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .kpi-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .kpi-value {
    margin-top: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 1px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 20px;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 16px;
  }
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .dow, .day {
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 10px 8px;
    min-height: 74px;
  }
  .dow {
    min-height: auto;
    text-align: center;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--muted2);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }
  .day.empty { opacity: 0.2; }
  .day.green { background: rgba(0,230,118,0.08); }
  .day.red { background: rgba(255,61,87,0.08); }
  .day .num { font-weight: 700; margin-bottom: 8px; }
  .day .pnl { font-size: 11px; color: var(--muted2); }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    padding: 11px 8px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    font-size: 13px;
    vertical-align: top;
  }
  th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .good { color: var(--green); }
  .bad { color: var(--red); }
  .pill {
    display: inline-block;
    background: rgba(0,229,255,0.12);
    color: var(--cyan);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    margin: 0 8px 8px 0;
    font-family: 'DM Mono', monospace;
  }
  @media (max-width: 980px) {
    .wrap { padding: 16px; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: 1fr; }
    table { display: block; overflow-x: auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>TRADE JOURNAL</h1>
      <div class="sub">calendario · sesiones importadas · pnl · ranking de tickers</div>
    </div>
    <a class="back-btn" href="proyecto_bitacora_home.html">← Volver al Home</a>
  </header>

  <div class="kpis">
    <div class="card"><div class="kpi-label">Sesiones importadas</div><div class="kpi-value" id="kpiSessions">—</div></div>
    <div class="card"><div class="kpi-label">Trades detectados</div><div class="kpi-value" id="kpiTrades">—</div></div>
    <div class="card"><div class="kpi-label">PNL importado</div><div class="kpi-value" id="kpiPnl">—</div></div>
    <div class="card"><div class="kpi-label">Media por sesión</div><div class="kpi-value" id="kpiAvg">—</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title" id="calendarTitle">Calendario</div>
      <div class="calendar" id="calendarRoot"></div>
    </div>

    <div class="card">
      <div class="section-title">Radar rápido</div>
      <div id="topTickers"></div>
      <div style="margin-top:16px;color:var(--muted2);font-size:13px;line-height:1.6" id="summaryText">
        Cargando resumen...
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:20px;">
    <div class="section-title">Sesiones guardadas</div>
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Origen</th>
          <th>Trades</th>
          <th>Creados</th>
          <th>Actualizados</th>
          <th>PNL</th>
          <th>Última act.</th>
        </tr>
      </thead>
      <tbody id="sessionsBody"></tbody>
    </table>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDVR0xHEt5AIUPANlnfNok3dFqBVQb7jT0",
  authDomain: "proyecto-bitacora-fead3.firebaseapp.com",
  projectId: "proyecto-bitacora-fead3",
  storageBucket: "proyecto-bitacora-fead3.firebasestorage.app",
  messagingSenderId: "907354671911",
  appId: "1:907354671911:web:68000bcbaa989d25db7702"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function fmtMoney(n) {
  const value = Number(n || 0);
  return `${value >= 0 ? '+' : '-'}$${Math.abs(value).toFixed(2)}`;
}

function monthLabel(date) {
  return date.toLocaleDateString('es-ES', { month: 'long', year: 'numeric', timeZone: 'UTC' });
}

function renderCalendar(items) {
  const root = document.getElementById('calendarRoot');
  root.innerHTML = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(day => `<div class="dow">${day}</div>`).join('');

  const byDate = Object.fromEntries(items.map(item => [item.tradeDate, item]));
  const base = items.length ? new Date(`${items[0].tradeDate}T00:00:00Z`) : new Date();
  const year = base.getUTCFullYear();
  const month = base.getUTCMonth();
  document.getElementById('calendarTitle').textContent = `Calendario · ${monthLabel(base)}`;
  const first = new Date(Date.UTC(year, month, 1));
  const offset = (first.getUTCDay() + 6) % 7;
  const totalDays = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();

  for (let i = 0; i < offset; i += 1) root.insertAdjacentHTML('beforeend', '<div class="day empty"></div>');
  for (let day = 1; day <= totalDays; day += 1) {
    const stamp = new Date(Date.UTC(year, month, day)).toISOString().slice(0, 10);
    const item = byDate[stamp];
    const pnl = item ? Number(item.estimatedNetPnl || 0) : null;
    const css = pnl == null ? '' : (pnl >= 0 ? 'green' : 'red');
    root.insertAdjacentHTML('beforeend', `<div class="day ${css}"><div class="num">${day}</div><div class="pnl">${pnl == null ? '—' : fmtMoney(pnl)}</div></div>`);
  }
}

function renderTopTickers(trades) {
  const bucket = {};
  trades.forEach(trade => {
    const symbol = String(trade.ticker || '').toUpperCase();
    if (!symbol) return;
    const pnl = Number(trade.pnl || 0);
    if (!bucket[symbol]) bucket[symbol] = { symbol, pnl: 0, count: 0 };
    bucket[symbol].pnl += pnl;
    bucket[symbol].count += 1;
  });
  const top = Object.values(bucket).sort((a, b) => b.pnl - a.pnl).slice(0, 8);
  document.getElementById('topTickers').innerHTML = top.length
    ? top.map(item => `<span class="pill">${item.symbol} · ${fmtMoney(item.pnl)}</span>`).join('')
    : '<span style="color:var(--muted2);font-size:13px;">Todavía no hay tickers suficientes.</span>';
}

async function loadDashboard() {
  const [sessionsSnap, tradesSnap] = await Promise.all([
    db.collection('trade_import_sessions').orderBy('tradeDate', 'desc').get(),
    db.collection('trading_discrecional').get()
  ]);

  const sessions = [];
  sessionsSnap.forEach(doc => sessions.push({ id: doc.id, ...doc.data() }));

  const trades = [];
  tradesSnap.forEach(doc => {
    if (doc.id === '_index' || doc.id.startsWith('trades_')) return;
    trades.push(doc.data());
  });

  const totalSessions = sessions.length;
  const totalTrades = sessions.reduce((sum, item) => sum + Number(item.totalTradesDetected || 0), 0);
  const totalPnl = sessions.reduce((sum, item) => sum + Number(item.estimatedNetPnl || 0), 0);
  const avg = totalSessions ? totalPnl / totalSessions : 0;

  document.getElementById('kpiSessions').textContent = totalSessions || '0';
  document.getElementById('kpiTrades').textContent = totalTrades || '0';
  document.getElementById('kpiPnl').textContent = fmtMoney(totalPnl);
  document.getElementById('kpiPnl').className = `kpi-value ${totalPnl >= 0 ? 'good' : 'bad'}`;
  document.getElementById('kpiAvg').textContent = fmtMoney(avg);
  document.getElementById('kpiAvg').className = `kpi-value ${avg >= 0 ? 'good' : 'bad'}`;

  document.getElementById('summaryText').textContent = totalSessions
    ? `Sesiones registradas: ${totalSessions}. PNL agregado importado: ${fmtMoney(totalPnl)}. Esta pantalla ya deja preparada la base para seguir ampliando calendario, hábitos y estadísticas por sesión.`
    : 'Todavía no hay sesiones importadas. En cuanto guardes capturas, aquí aparecerán el calendario y el resumen.';

  document.getElementById('sessionsBody').innerHTML = sessions.length
    ? sessions.map(item => `
      <tr>
        <td><strong>${item.tradeDate || '—'}</strong></td>
        <td>${item.source || 'manual'}</td>
        <td>${item.totalTradesDetected || 0}</td>
        <td>${item.totalTradesCreated || 0}</td>
        <td>${item.totalTradesUpdated || 0}</td>
        <td class="${Number(item.estimatedNetPnl || 0) >= 0 ? 'good' : 'bad'}">${fmtMoney(item.estimatedNetPnl || 0)}</td>
        <td>${item.updatedAt ? String(item.updatedAt).replace('T', ' ').replace('Z', '') : '—'}</td>
      </tr>
    `).join('')
    : '<tr><td colspan="7" style="color:var(--muted2)">Todavía no hay sesiones guardadas.</td></tr>';

  renderCalendar(sessions);
  renderTopTickers(trades);
}

loadDashboard().catch(error => {
  document.getElementById('summaryText').textContent = 'Error cargando dashboard: ' + error.message;
});
</script>
</body>
</html>
