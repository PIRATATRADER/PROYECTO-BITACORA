<!-- Panel -->
<div id="quickAddPanel" style="

    <!-- Upload área -->
    <div id="quickUploadArea" onclick="document.getElementById('quickImageInput').click()" style="
      border:2px dashed var(--border); border-radius:8px; padding:20px 12px;
      text-align:center; cursor:pointer; transition:all 0.2s;
      background:rgba(177,106,255,0.02);
    " onmouseover="this.style.borderColor='var(--purple)'; this.style.background='rgba(177,106,255,0.08)'" onmouseout="this.style.borderColor='var(--border)'; this.style.background='rgba(177,106,255,0.02)'" ondragover="event.preventDefault(); this.style.borderColor='var(--purple)'; this.style.background='rgba(177,106,255,0.15)'" ondragleave="this.style.borderColor='var(--border)'; this.style.background='rgba(177,106,255,0.02)'" ondrop="event.preventDefault(); this.style.borderColor='var(--border)'; this.style.background='rgba(177,106,255,0.02)'; quickHandleImageDrop(event)">
      <div style="font-size:28px;margin-bottom:6px;">📷</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text);font-weight:600;">Arrastra imagen aquí</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-top:4px;">o haz click para seleccionar</div>

    <!-- Processing status -->
    <div id="quickProcessingStatus" style="display:none; margin-top:12px; padding:10px; background:rgba(177,106,255,0.05); border:1px solid rgba(177,106,255,0.2); border-radius:8px;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);font-weight:700;display:flex;align-items:center;gap:8px;">

    <!-- Extracted data display -->
    <div id="quickExtractedData" style="display:none; margin-top:12px; background:var(--bg3); border:1px solid rgba(0,230,118,0.3); border-radius:8px; padding:10px; border-left:3px solid var(--green);">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--green);font-weight:700;margin-bottom:8px;">✓ DATOS EXTRAÍDOS</div>
      <div id="quickExtractedDataContent" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);line-height:1.6;"></div>
    </div>

    <!-- Error display -->
    <div id="quickImageError" style="display:none; margin-top:12px; background:rgba(255,61,87,0.05); border:1px solid rgba(255,61,87,0.3); border-radius:8px; padding:10px; border-left:3px solid var(--red);">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--red);font-weight:700;">⚠ ERROR</div>
      <div id="quickImageErrorText" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted2);margin-top:4px;"></div>

  <!-- Botones estado -->
  <div id="quickStateButtons" style="display:none; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
    <button onclick="quickAddTrade('estudio')" style="
      background:rgba(255,193,7,0.12); border:1px solid rgba(255,193,7,0.3);
      border-radius:8px; padding:10px; color:#ffc107;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.15s; letter-spacing:0.5px;
    " onmouseover="this.style.background='rgba(255,193,7,0.22)'" onmouseout="this.style.background='rgba(255,193,7,0.12)'">📋 ESTUDIO</button>
    <button onclick="quickAddTrade('ejecucion')" style="
      background:rgba(33,150,243,0.12); border:1px solid rgba(33,150,243,0.3);
      border-radius:8px; padding:10px; color:#2196f3;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.15s; letter-spacing:0.5px;
    " onmouseover="this.style.background='rgba(33,150,243,0.22)'" onmouseout="this.style.background='rgba(33,150,243,0.12)'">▶ EJECUCIÓN</button>
  </div>

  <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;letter-spacing:0.5px;">Si el ticker existe, se copian todos sus datos</div>
</div>

<script>
// ── VARIABLES GLOBALES ────────────────────────────────────────────────────
let quickSelectedImage = null;
let quickExtractedTradeData = null;

function toggleQuickPanel() {
  const panel = document.getElementById('quickAddPanel');
  const isOpen = panel.style.display === 'flex';
  panel.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) {
    quickResetPanel();
    setTimeout(() => document.getElementById('quickTicker').focus(), 50);
  }
}

function quickResetPanel() {
  document.getElementById('quickTicker').value = '';
  document.getElementById('quickPreview').style.display = 'none';
  document.getElementById('quickImageSection').style.display = 'none';
  document.getElementById('quickStateButtons').style.display = 'none';
  document.getElementById('quickImagePreview').style.display = 'none';
  document.getElementById('quickProcessingStatus').style.display = 'none';
  document.getElementById('quickExtractedData').style.display = 'none';
  document.getElementById('quickImageError').style.display = 'none';
  document.getElementById('quickImageInput').value = '';
  quickSelectedImage = null;
  quickExtractedTradeData = null;
}

function quickHandleTicker() {
  const val = document.getElementById('quickTicker').value.toUpperCase().trim();
  const preview = document.getElementById('quickPreview');
  const imageSection = document.getElementById('quickImageSection');
  const stateButtons = document.getElementById('quickStateButtons');
  
  if (!val) { 
    preview.style.display = 'none';
    imageSection.style.display = 'none';
    stateButtons.style.display = 'none';
    return; 
  }

  imageSection.style.display = 'block';

  const matches = allTrades
    .filter(t => (t.ticker||'').toUpperCase().trim() === val)
    .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));

  if (!matches.length) {
    preview.style.display = 'block';
    preview.innerHTML = '<span style="color:var(--muted);">⚠ Ticker nuevo — se creará sin datos previos</span>';
    return;
  }

  const t = matches[0];
  const fechaStr = (t.fecha||'').replace(/(\d{4})-(\d{2})-(\d{2})/, '$3/$2/$1');
  const notasText = matches.map(m => m.notas || '').find(n => n.trim() !== '') || '';
  const notasBlock = notasText
    ? `<div style="margin-top:8px;padding:8px 10px;background:rgba(255,214,0,0.07);border:1px solid rgba(255,214,0,0.35);border-left:2px solid var(--yellow);border-radius:6px;">
        <div style="font-size:9px;letter-spacing:1.5px;color:var(--yellow);font-weight:700;margin-bottom:4px;">⚠ NOTAS ANTERIORES</div>
        <div style="color:var(--muted2);font-size:10px;white-space:pre-wrap;word-break:break-word;max-height:55px;overflow:hidden;-webkit-mask-image:linear-gradient(to bottom,black 55%,transparent 100%);mask-image:linear-gradient(to bottom,black 55%,transparent 100%);">${notasText}</div>
      </div>`
    : '';
  preview.style.display = 'block';
  preview.innerHTML = `
    <span style="color:var(--green);font-weight:700;">✓ ${matches.length} trade${matches.length>1?'s':''} anterior${matches.length>1?'es':''} encontrado${matches.length>1?'s':''}</span><br>
    <span style="color:var(--muted2);">Último:</span> <span style="color:var(--text);">${fechaStr}</span><br>
    ${t.marketCap ? `<span style="color:var(--muted2);">M.Cap:</span> <span style="color:var(--text);">${t.marketCap}</span><br>` : ''}
    ${t.float    ? `<span style="color:var(--muted2);">Float:</span> <span style="color:var(--text);">${t.float}</span><br>` : ''}
    ${t.sector   ? `<span style="color:var(--muted2);">Sector:</span> <span style="color:var(--text);">${t.sector}</span>` : ''}
    ${notasBlock}
  `;
}

function quickShowStateButtons() {
  const ticker = document.getElementById('quickTicker').value.toUpperCase().trim();
  if (!ticker) return;
  
  const buttons = document.getElementById('quickStateButtons');
  buttons.style.display = 'grid';
  
  // Si no hay imagen cargada, mostrar botones inmediatamente
  if (!quickSelectedImage) {
    buttons.style.display = 'grid';
  }
}

function quickHandleImageDrop(e) {
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    document.getElementById('quickImageInput').files = files;
    quickHandleImageSelect();
  }
}

function quickHandleImageSelect() {
  const fileInput = document.getElementById('quickImageInput');
  const file = fileInput.files[0];
  
  if (!file) return;
  
  if (!file.type.startsWith('image/')) {
    quickShowImageError('Por favor selecciona una imagen válida (PNG, JPG, JPEG)');
    return;
  }

  quickSelectedImage = file;
  
  // Mostrar preview
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('quickImagePreviewImg').src = e.target.result;
    document.getElementById('quickImagePreview').style.display = 'block';
    document.getElementById('quickImageError').style.display = 'none';
    
    // Procesar automáticamente
    quickProcessTradeImage();
  };
  reader.readAsDataURL(file);
}

function quickShowImageError(message) {
  document.getElementById('quickImageError').style.display = 'block';
  document.getElementById('quickImageErrorText').textContent = message;
}

function quickFileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function quickProcessTradeImage() {
  if (!quickSelectedImage) return;
  
  document.getElementById('quickProcessingStatus').style.display = 'block';
  document.getElementById('quickExtractedData').style.display = 'none';
  document.getElementById('quickImageError').style.display = 'none';
  
  try {
    updateQuickProgress(10, 'Convirtiendo imagen...');
    const base64Image = await quickFileToBase64(quickSelectedImage);
    
    updateQuickProgress(30, 'Enviando a Claude API...');
    const extractedData = await quickExtractTradeDataFromImage(base64Image);
    
    updateQuickProgress(80, 'Procesando datos...');
    quickExtractedTradeData = extractedData;
    
    updateQuickProgress(100, 'Completado ✓');
    
    setTimeout(() => {
      document.getElementById('quickProcessingStatus').style.display = 'none';
      quickDisplayExtractedData(extractedData);
      
      // Mostrar botones de estado
      document.getElementById('quickStateButtons').style.display = 'grid';
    }, 300);
    
  } catch(err) {
    console.error('Error procesando imagen:', err);
    document.getElementById('quickProcessingStatus').style.display = 'none';
    quickShowImageError(err.message || 'Error procesando la imagen');
  }
}

function updateQuickProgress(percentage, text) {
  document.getElementById('quickProcessingProgressBar').style.width = percentage + '%';
  document.getElementById('quickProcessingText').textContent = text;
}

async function quickExtractTradeDataFromImage(base64Image) {
  if (!ANTHROPIC_API_KEY) {
    throw new Error('No hay API key de Claude configurada');
  }

  const systemPrompt = `Eres un experto en analizar capturas de pantalla de aplicaciones de trading.
Tu tarea es extraer información de trades de la imagen proporcionada.

EXTRAE SOLO los siguientes campos si son visibles:
- pnlShort: PNL para posiciones Short (número)
- rrShort: Ratio R para posiciones Short (número, por ejemplo 0.27)
- pnlLong: PNL para posiciones Long (número)
- rrLong: Ratio R para posiciones Long (número, por ejemplo 0.27)
- precioEntrada: Precio de entrada del trade
- setupEntrada: Descripción del setup de entrada
- inicio: Hora/tiempo de inicio del trade
- closed: Hora/tiempo de cierre del trade
- notas: Cualquier nota o comentario visible

Devuelve SOLO JSON válido, sin comentarios ni markdown.`;

  const prompt = `Analiza esta imagen de trading y extrae toda la información visible del trade.

Busca específicamente:
- PNL Long y Short (con sus valores numéricos)
- R (Ratio de Riesgo/Recompensa) para Long y Short
- Precio de entrada
- Setup de entrada
- Hora de inicio y cierre
- Cualquier otra información visible

Devuelve un objeto JSON con este formato:
{
  "pnlShort": 35.01,
  "rrShort": 0.27,
  "pnlLong": null,
  "rrLong": null,
  "precioEntrada": "12.50",
  "setupEntrada": "descuento del setup",
  "inicio": "09:30",
  "closed": "10:15",
  "notas": "información adicional"
}

Omite los campos que no puedas ver en la imagen. Devuelve null para valores no encontrados.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ANTHROPIC_API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [
        {
          role: 'user',
          content: [
            {
              type: 'image',
              source: {
                type: 'base64',
                media_type: quickSelectedImage.type,
                data: base64Image
              }
            },
            {
              type: 'text',
              text: prompt
            }
          ]
        }
      ]
    })
  });

  if (!response.ok) {
    const errorText = await response.text();
    throw new Error(`API Error ${response.status}: ${errorText}`);
  }

  const data = await response.json();
  const textBlock = data.content.find(b => b.type === 'text');
  
  if (!textBlock) {
    throw new Error('No se recibió respuesta de texto de la API');
  }

  let jsonText = textBlock.text.trim();
  jsonText = jsonText.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '').trim();
  
  const parsedResponse = JSON.parse(jsonText);
  return parsedResponse;
}

function quickDisplayExtractedData(data) {
  document.getElementById('quickExtractedData').style.display = 'block';
  
  const content = [];
  if (data.pnlShort != null) content.push(`📊 SHORT PNL: $${data.pnlShort.toFixed(2)}`);
  if (data.rrShort != null) content.push(`SHORT R: ${data.rrShort.toFixed(2)}R`);
  if (data.pnlLong != null) content.push(`📊 LONG PNL: $${data.pnlLong.toFixed(2)}`);
  if (data.rrLong != null) content.push(`LONG R: ${data.rrLong.toFixed(2)}R`);
  if (data.precioEntrada) content.push(`💰 ENTRADA: $${data.precioEntrada}`);
  if (data.setupEntrada) content.push(`⚙ SETUP: ${data.setupEntrada}`);
  if (data.inicio) content.push(`🕐 INICIO: ${data.inicio}`);
  if (data.closed) content.push(`🔚 CIERRE: ${data.closed}`);
  
  document.getElementById('quickExtractedDataContent').innerHTML = content.join('<br>') || 'Sin datos extraídos';
}

async function quickAddTrade(estado) {
  const ticker = document.getElementById('quickTicker').value.toUpperCase().trim();
  if (!ticker) {
    document.getElementById('quickTicker').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('quickTicker').style.borderColor = '', 1500);
    return;
  }

  const today = new Date().toISOString().split('T')[0];

  // Buscar trade previo más reciente
  const matches = allTrades
    .filter(t => (t.ticker||'').toUpperCase().trim() === ticker)
    .sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));

  const prev = matches[0] || {};

  // Construir nuevo trade copiando campos del anterior + datos extraídos
  const newTrade = {
    fecha:       today,
    ticker:      ticker,
    estado:      estado,
    pais:        prev.pais        || '',
    sector:      prev.sector      || '',
    plays:       prev.plays        || [],
    marketCap:   prev.marketCap   || '',
    float:       prev.float       || '',
    insiders:    prev.insiders    || '',
    instOwn:     prev.instOwn     || '',
    cashNeed:    prev.cashNeed    || '',
    overhead:    '',
    locatesRegSho: false,
    dilucion:    prev.dilucion    || [],
    noticia:     '',
    
    // Datos de la imagen extraída (con fallback a valores anteriores)
    precioEntrada: quickExtractedTradeData?.precioEntrada || prev.precioEntrada || '',
    setupEntrada:  quickExtractedTradeData?.setupEntrada || prev.setupEntrada || '',
    inicio:        quickExtractedTradeData?.inicio || prev.inicio || '',
    closed:        quickExtractedTradeData?.closed || prev.closed || '',
    
    // PNL y RR (con fallback a valores anteriores)
    pnlShort:    quickExtractedTradeData?.pnlShort ?? prev.pnlShort ?? null,
    rrShort:     quickExtractedTradeData?.rrShort ?? prev.rrShort ?? null,
    pnlLong:     quickExtractedTradeData?.pnlLong ?? prev.pnlLong ?? null,
    rrLong:      quickExtractedTradeData?.rrLong ?? prev.rrLong ?? null,
    
    // PNL total
    pnl:         (quickExtractedTradeData?.pnlShort ?? prev.pnlShort ?? 0) + 
                 (quickExtractedTradeData?.pnlLong ?? prev.pnlLong ?? 0),
    
    preMarketHigh: prev.preMarketHigh || '',
    vwap:        prev.vwap        || '',
    shares:      prev.shares      || null,
    commissions: prev.commissions || null,
    jordiPlayPNL: prev.jordiPlayPNL || null,
    jordiPlayR:  prev.jordiPlayR  || null,
    chartImage:  prev.chartImage  || '',
    notas:       quickExtractedTradeData?.notas || prev.notas || '',
    ejecucionStartTime: estado === 'ejecucion' ? Date.now() : null,
  };

  try {
    const savedId = await saveSingleTrade(newTrade);
    newTrade.id = savedId;
  } catch(e) {
    console.warn('Firestore save error:', e);
    if (!allTrades.some(t => t.id === newTrade.id)) {
      allTrades.push(newTrade);
      renderDashboard();
    }
  }

  toggleQuickPanel();

  // Toast confirmación
  const estadoLabel = estado === 'estudio' ? '📋 ESTUDIO' : '▶ EJECUCIÓN';
  const isPrev = matches.length > 0;
  const dataSource = quickSelectedImage ? ' + datos de imagen' : '';
  const toast = document.createElement('div');
  toast.innerHTML = `⚡ <strong>${ticker}</strong> añadido en ${estadoLabel}${dataSource}${isPrev ? ' — datos copiados del trade anterior' : ' — ticker nuevo'}`;
  toast.style.cssText = `
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    background:var(--bg3); border:1px solid var(--purple); border-radius:10px;
    padding:12px 22px; font-size:13px; color:var(--text); z-index:9999;
    box-shadow:0 4px 20px rgba(177,106,255,0.25);
    animation:fadeUp 0.3s ease forwards; white-space:nowrap;
  `;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity 0.4s'; setTimeout(()=>toast.remove(),400); }, 3500);

  // ── Aviso de notas anteriores ──────────────────────────────────────────────
  const notasText = matches.map(m => m.notas || '').find(n => n.trim() !== '') || '';
  if (notasText) {
    const notasToast = document.createElement('div');
    notasToast.id = 'notasAlertToast_' + ticker;
    notasToast.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <span style="font-size:18px;flex-shrink:0;">📋</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:9px;letter-spacing:1.5px;color:var(--yellow);font-weight:700;margin-bottom:5px;font-family:'DM Mono',monospace;">⚠ ${ticker} — NOTAS ANTERIORES</div>
          <div style="color:var(--muted2);font-size:11px;font-family:'DM Mono',monospace;white-space:pre-wrap;word-break:break-word;max-height:70px;overflow:hidden;-webkit-mask-image:linear-gradient(to bottom,black 55%,transparent 100%);mask-image:linear-gradient(to bottom,black 55%,transparent 100%);">${notasText}</div>
        </div>
        <button onclick="this.closest('#notasAlertToast_${ticker}').remove()" style="
          flex-shrink:0;background:rgba(255,214,0,0.15);border:1px solid rgba(255,214,0,0.4);
          border-radius:6px;color:var(--yellow);font-family:'DM Mono',monospace;
          font-size:9px;font-weight:700;padding:5px 9px;cursor:pointer;align-self:center;white-space:nowrap;
        ">✓ YA LAS LEÍ</button>
      </div>
    `;
    notasToast.style.cssText = `
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
      background:var(--bg3); border:1px solid rgba(255,214,0,0.5);
      border-left:3px solid var(--yellow);
      border-radius:10px; padding:14px 16px;
      width:min(420px, calc(100vw - 40px));
      font-size:13px; color:var(--text); z-index:9998;
      box-shadow:0 4px 24px rgba(255,214,0,0.15);
      animation:fadeUp 0.3s ease forwards;
    `;
    document.body.appendChild(notasToast);
  }
}

// Cerrar panel al pulsar fuera
document.addEventListener('click', function(e) {
  const panel = document.getElementById('quickAddPanel');
  const btn   = document.getElementById('quickAddBtn');
  if (panel && panel.style.display === 'flex' && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.style.display = 'none';
  }
});

</script>
